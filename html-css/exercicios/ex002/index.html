<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>parágrafos</title>
</head>
<body>
    <h1>parágrafos e quebras de linha</h1>
    <hr>
    <p>
        você pode escrever
        um parágrafo de qualquer jeito.
        basta colocar tudo
        no meio do par de tags &lt; p &gt; e &lt; /p &gt; <!-- LESS THAN / GREATER THAN -->
    </p>
    <p>
        utilizando a tag br <br> teremos uma quebra de linha
    </p>
    <!-- SIMBOLOS -->
    <p> vamos adicionar alguns simbolos especiais</p>
    &reg; <!-- marca registrada -->
    &copy; <!-- copyright -->
    &trade; <!-- tm (TradeMark) marca comercial-->
    &euro; <!-- euro moeda -->
    &pound; <!-- libra moeda -->
    &yen; <!-- yene moeda -->
    &cent; <!-- centavos americanos moeda -->
    &Delta; <!-- triângulo delta -->
    &uparrow; <!-- seta pra cima -->

    <p> vamos adicionar alguns emojis </p>
    &#x1F596;
    &#x1F913;
</body>
</html>
